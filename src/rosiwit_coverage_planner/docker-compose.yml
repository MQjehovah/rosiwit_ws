# ROS2 Coverage Planner - Docker Compose 配置
# 用于多服务编排和开发环境管理

version: '3.8'

services:
  # ==================== Coverage Planner 主服务 ====================
  coverage_planner:
    build:
      context: .
      dockerfile: Dockerfile
      target: production  # 使用生产镜像
    image: ros2_coverage_planner:latest
    container_name: coverage_planner_node
    restart: unless-stopped
    
    # 网络配置
    networks:
      - ros2_network
    
    # 环境变量
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    
    # 参数配置（可通过环境变量覆盖）
    command: >
      ros2 launch ros2_coverage_planner coverage_planner.launch.py
      coverage_mode:=zigzag
      robot_radius:=0.3
    
    # 健康检查
    healthcheck:
      test: ["CMD", "ros2", "topic", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 开发环境服务 ====================
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development  # 使用开发镜像
    image: ros2_coverage_planner:dev
    container_name: coverage_planner_dev
    profiles: ["dev"]  # 仅在开发模式启动
    
    networks:
      - ros2_network
    
    # 挂载源代码（用于开发调试）
    volumes:
      - ./src:/ros2_ws/src/ros2_coverage_planner/src
      - ./include:/ros2_ws/src/ros2_coverage_planner/include
      - ./test:/ros2_ws/src/ros2_coverage_planner/test
      - ./config:/ros2_ws/src/ros2_coverage_planner/config
      - ./launch:/ros2_ws/src/ros2_coverage_planner/launch
    
    # 开发环境命令
    command: bash
    
    # 开发工具
    stdin_open: true
    tty: true

  # ==================== 测试服务 ====================
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: testing  # 使用测试镜像
    image: ros2_coverage_planner:test
    container_name: coverage_planner_test
    profiles: ["test"]  # 仅在测试模式启动
    
    networks:
      - ros2_network
    
    # 运行测试
    command: >
      colcon test --packages-select ros2_coverage_planner &&
      colcon test-result --verbose
    
    # 测试结果输出
    volumes:
      - ./test_results:/ros2_ws/test_results

  # ==================== 地图模拟服务（可选） ====================
  map_publisher:
    image: ros:humble-ros-base
    container_name: fake_map_publisher
    profiles: ["demo"]  # 仅在演示模式启动
    
    networks:
      - ros2_network
    
    environment:
      - ROS_DOMAIN_ID=0
    
    # 发布模拟地图（用于演示）
    command: >
      ros2 topic pub /map nav_msgs/OccupancyGrid
      "{header: {stamp: {sec: 0, nanosec: 0}, frame_id: 'map'},
      info: {map_load_time: {sec: 0, nanosec: 0}, resolution: 0.05,
      width: 100, height: 100, origin: {position: {x: 0.0, y: 0.0, z: 0.0},
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}}},
      data: [0]}"
      --rate 1.0

# ==================== 网络配置 ====================
networks:
  ros2_network:
    driver: bridge
    name: ros2_coverage_network

# ==================== 卷配置 ====================
volumes:
  test_results:
    name: coverage_test_results