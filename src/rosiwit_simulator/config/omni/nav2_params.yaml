# Nav2 参数配置 - 全向驱动
# 从 ROS1 move_base 配置迁移而来

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 4.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "teb_local_planner::TebLocalPlannerROS"
      odom_topic: odom
      map_frame: odom

      # Trajectory
      teb_autosize: true
      dt_ref: 0.45
      dt_hysteresis: 0.1
      global_plan_overwrite_orientation: true
      max_global_plan_lookahead_dist: 3.0
      feasibility_check_no_poses: 5

      # Robot (全向驱动)
      min_vel_x: 0.1
      max_vel_x: 0.7
      max_vel_y: 0.5
      max_vel_x_backwards: 0.35
      max_vel_theta: 2.0
      acc_lim_x: 0.85
      acc_lim_y: 0.85
      acc_lim_theta: 1.50
      min_turning_radius: 0.0
      footprint_model:
        type: "polygon"
        vertices: [[-0.12, -0.12], [-0.12, 0.12], [0.12, 0.12], [0.12, -0.12]]

      # GoalTolerance
      xy_goal_tolerance: 0.2
      yaw_goal_tolerance: 0.5
      free_goal_vel: false

      # Obstacles
      min_obstacle_dist: 0.15
      include_costmap_obstacles: true
      costmap_obstacles_behind_robot_dist: 1.0
      obstacle_poses_affected: 7
      costmap_converter_plugin: ""
      costmap_converter_spin_thread: true
      costmap_converter_rate: 5

      # Optimization
      no_inner_iterations: 5
      no_outer_iterations: 4
      optimization_activate: true
      optimization_verbose: false
      penalty_epsilon: 0.1
      weight_max_vel_x: 1
      weight_max_vel_y: 1
      weight_max_vel_theta: 1
      weight_acc_lim_x: 1
      weight_acc_lim_y: 1
      weight_acc_lim_theta: 1
      weight_kinematics_nh: 100
      weight_kinematics_forward_drive: 1
      weight_kinematics_turning_radius: 1
      weight_optimaltime: 1
      weight_obstacle: 50
      weight_dynamic_obstacle: 10
      selection_alternative_time_cost: false

      # Homotopy Class Planner
      enable_homotopy_class_planning: false
      enable_multithreading: true
      simple_exploration: false
      max_number_classes: 4
      roadmap_graph_no_samples: 15
      roadmap_graph_area_width: 5
      h_signature_prescaler: 0.5
      h_signature_threshold: 0.1
      obstacle_keypoint_offset: 0.1

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 3.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      transform_tolerance: 1.2
      footprint: "[[-0.12, -0.12], [-0.12, 0.12], [0.12, 0.12], [0.12, -0.12]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        max_obstacle_height: 0.6
        min_obstacle_height: 0.0
        obstacle_range: 2.0
        raytrace_range: 5.0
        combination_method: 1
        observation_sources: laser_scan_sensor
        laser_scan_sensor:
          data_type: "LaserScan"
          topic: /scan
          marking: true
          clearing: true
          expected_update_rate: 0.0
          min_obstacle_height: 0.0
          max_obstacle_height: 0.30
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 10.0
        inflation_radius: 0.20
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.5
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      rolling_window: false
      resolution: 0.05
      transform_tolerance: 1.2
      footprint: "[[-0.12, -0.12], [-0.12, 0.12], [0.12, 0.12], [0.12, -0.12]]"
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: "/map"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 10.0
        inflation_radius: 0.20
      always_send_full_costmap: true

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: false
    node_names: ["controller_server", "planner_server", "behavior_server", "bt_navigator"]

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names: ["controller_server", "planner_server", "behavior_server", "bt_navigator"]
