# ============================================================
# rosiwit_simulator - GitLab CI/CD Pipeline (ROS2 Humble)
# ============================================================
# Pipeline stages:
#   1. lint    - Code quality and style checks
#   2. build   - ROS2 colcon build + Docker image build
#   3. test    - Automated testing
#   4. deploy  - Image push and deployment
# ============================================================

# Global variables
variables:
  DOCKER_IMAGE: "rosiwit-simulator"
  DOCKER_TAG: "2.0.0"
  DOCKER_REGISTRY: "${CI_REGISTRY}"
  ROS_DISTRO: "humble"
  ROS_VERSION: "2"
  # Docker build optimizations
  DOCKER_BUILDKIT: "1"
  DOCKER_DRIVER: overlay2
  # Use Docker layer caching
  GIT_DEPTH: "1"

# Stages
stages:
  - lint
  - build
  - test
  - deploy

# Default settings
default:
  # Security: restrict capabilities
  image: ros:humble-ros-base-jammy
  before_script:
    - source /opt/ros/humble/setup.bash
  # Timeout for each job
  timeout: 30 minutes
  # Retry on infrastructure failures
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ============================================================
# Stage 1: Lint
# ============================================================
xmllint:
  stage: lint
  image: alpine:3.18
  before_script:
    - apk add --no-cache libxml2-utils
  script:
    - echo "Checking XML files..."
    - find . -name "*.xml" -not -path "./docker/*" -exec xmllint --noout {} \;
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: true

shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  before_script: []
  script:
    - echo "Checking shell scripts..."
    - find docker/ -name "*.sh" -exec shellcheck {} \;
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: true

cmake-lint:
  stage: lint
  image: ros:humble-ros-base-jammy
  before_script:
    - pip3 install cmake-lint
    - source /opt/ros/humble/setup.bash
  script:
    - echo "Checking CMakeLists.txt..."
    - cmake-lint CMakeLists.txt || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: true

# ============================================================
# Stage 2: Build
# ============================================================
colcon-build:
  stage: build
  script:
    - echo "Building with colcon (ROS2 Humble)..."
    - mkdir -p /colcon_ws/src
    - cp -r . /colcon_ws/src/rosiwit_simulator
    - cd /colcon_ws
    - source /opt/ros/humble/setup.bash
    - colcon build --packages-select simulator
        --cmake-args -DCMAKE_BUILD_TYPE=Release
    - echo "Build completed successfully"
  artifacts:
    paths:
      - build/
      - install/
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

docker-build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker info
  script:
    - echo "Building Docker image..."
    - |
      docker build \
        -f docker/Dockerfile \
        --target runtime \
        -t ${DOCKER_IMAGE}:${DOCKER_TAG} \
        -t ${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA} \
        --label "git.ref=${CI_COMMIT_SHA}" \
        --label "git.branch=${CI_COMMIT_BRANCH}" \
        --label "build.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
        --label "ci.pipeline=${CI_PIPELINE_ID}" \
        .
    - echo "Docker image built: ${DOCKER_IMAGE}:${DOCKER_TAG}"
    - docker images ${DOCKER_IMAGE}
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  needs: []

# ============================================================
# Stage 3: Test
# ============================================================
colcon-test:
  stage: test
  script:
    - echo "Running colcon tests..."
    - mkdir -p /colcon_ws/src
    - cp -r . /colcon_ws/src/rosiwit_simulator
    - cd /colcon_ws
    - source /opt/ros/humble/setup.bash
    - colcon build --packages-select simulator
    - source install/setup.bash
    - colcon test --packages-select simulator
    - colcon test-result --verbose
  artifacts:
    reports:
      junit: build/simulator/test_results/**/*.xml
    when: always
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  needs:
    - job: colcon-build

launch-validation:
  stage: test
  script:
    - echo "Validating Python launch files..."
    - mkdir -p /colcon_ws/src
    - cp -r . /colcon_ws/src/rosiwit_simulator
    - cd /colcon_ws
    - source /opt/ros/humble/setup.bash
    - colcon build --packages-select simulator
    - source install/setup.bash
    - |
      for f in install/simulator/share/simulator/launch/*.launch.py; do
        echo "Validating: $(basename $f)"
        python3 -c "
      import importlib, sys
      sys.path.insert(0, 'install/simulator/share/simulator/launch')
      import ast
      with open('$f') as fp:
          ast.parse(fp.read())
      print(f'  Syntax OK: $f')
      " || exit 1
      done
    - echo "All launch files validated"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  needs:
    - job: colcon-build

# ============================================================
# Stage 4: Deploy
# ============================================================
docker-push:
  stage: deploy
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker info
    - echo "${CI_REGISTRY_PASSWORD}" | docker login -u "${CI_REGISTRY_USER}" --password-stdin "${CI_REGISTRY}"
  script:
    - echo "Pushing Docker image to registry..."
    - docker build -f docker/Dockerfile --target runtime
        -t ${CI_REGISTRY_IMAGE}:${DOCKER_TAG}
        -t ${CI_REGISTRY_IMAGE}:latest
        .
    - docker push ${CI_REGISTRY_IMAGE}:${DOCKER_TAG}
    - docker push ${CI_REGISTRY_IMAGE}:latest
    - echo "Image pushed: ${CI_REGISTRY_IMAGE}:${DOCKER_TAG}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  needs:
    - job: docker-build
    - job: colcon-test

pages:
  stage: deploy
  script:
    - echo "Deploying documentation..."
    - mkdir -p public
    - cp -r README.md DEPLOYMENT.md DEPENDENCIES.md public/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  needs: []
  allow_failure: true
