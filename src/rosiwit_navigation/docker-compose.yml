# ============================================================
# rosiwit_navigation - Docker Compose Configuration
# ============================================================

version: "3.8"

services:
  # ==================== Development Environment ====================
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: rosiwit-navigation:dev
    container_name: rosiwit-navigation-dev
    hostname: rosiwit-dev
    # Interactive mode for development
    stdin_open: true
    tty: true
    # Mount source code for live development
    volumes:
      - .:/ros2_ws/src/rosiwit_navigation:rw
      - ros2_build:/ros2_ws/build:rw
      - ros2_install:/ros2_ws/install:rw
      - ros2_log:/ros2_ws/log:rw
      - ros2_ccache:/root/.ccache:rw
    # Environment
    environment:
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=${ROS_LOCALHOST_ONLY:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      - CCACHE_DIR=/root/.ccache
    # Network: host mode for ROS2 DDS discovery
    network_mode: host
    # For GUI tools (Rviz)
    privileged: false
    ipc: host
    pid: host
    # Working directory
    working_dir: /ros2_ws
    # Default: interactive bash shell
    command: /bin/bash

  # ==================== Runtime / Production ====================
  runtime:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: rosiwit-navigation:runtime
    container_name: rosiwit-navigation-runtime
    hostname: rosiwit-runtime
    network_mode: host
    ipc: host
    pid: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    volumes:
      - ./config:/ros2_ws/src/rosiwit_navigation/config:ro
      - ./maps:/ros2_ws/src/rosiwit_navigation/maps:ro
    command: ["ros2", "launch", "diffbot_navigation", "navigation.launch.py"]

  # ==================== CI / Testing ====================
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: rosiwit-navigation:dev
    container_name: rosiwit-navigation-test
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=1
      - GTEST_COLOR=1
      - GTEST_OUTPUT=xml:/ros2_ws/test_results/
    volumes:
      - test_results:/ros2_ws/test_results:rw
    working_dir: /ros2_ws
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        source /opt/ros/humble/setup.bash
        source install/setup.bash || true
        echo "=== Building ==="
        colcon build --packages-select diffbot_navigation --symlink-install \
          --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=ON
        echo "=== Running Tests ==="
        colcon test --packages-select diffbot_navigation --event-handlers console_direct+
        echo "=== Test Results ==="
        colcon test-result --all --verbose

  # ==================== Linting ====================
  lint:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: rosiwit-navigation:dev
    container_name: rosiwit-navigation-lint
    network_mode: none
    working_dir: /ros2_ws/src/rosiwit_navigation
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "=== clang-format check ==="
        find include src -name '*.hpp' -o -name '*.cpp' | xargs clang-format --dry-run --Werror 2>&1 || echo "[WARN] Formatting issues found"
        echo "=== clang-tidy check ==="
        find include src -name '*.hpp' -o -name '*.cpp' | head -5 | xargs clang-tidy -p /ros2_ws/build/diffbot_navigation 2>&1 || echo "[WARN] Tidy issues found"
        echo "=== cppcheck ==="
        cppcheck --enable=all --suppress=missingIncludeSystem --std=c++17 \
          --error-exitcode=0 -I include/ src/ 2>&1 || echo "[WARN] Cppcheck issues found"

volumes:
  ros2_build:
  ros2_install:
  ros2_log:
  ros2_ccache:
  test_results:
