# ============================================================
# Diffbot Navigation - 避障参数配置
# ============================================================

obstacle_avoidance:
  ros__parameters:
    # 避障模式
    # - dynamic_window: 动态窗口法
    # - potential_field: 人工势场法
    # - hybrid: 混合方法
    mode: "dynamic_window"
    
    # 障碍物检测
    detection:
      # 检测距离 (m)
      detection_range: 2.5
      # 最小障碍物距离
      min_obstacle_distance: 0.3
      # 安全距离
      safe_distance: 0.5
      
      # 传感器配置
      use_laser_scan: true
      use_point_cloud: false
      scan_topic: "/scan"
      point_cloud_topic: "/point_cloud"
    
    # 避障策略
    strategy:
      # 避障半径
      avoidance_radius: 0.8
      
      # 绕障速度
      avoidance_velocity: 0.3
      
      # 最小绕障距离
      min_avoidance_distance: 0.5
      
      # 是否允许反向运动
      allow_reverse: false
      
      # 最大绕障时间 (s)
      max_avoidance_time: 10.0
    
    # 动态障碍物预测
    prediction:
      enabled: true
      prediction_time: 2.0
      prediction_step: 0.1
      
    # 代价函数权重
    cost_weights:
      obstacle_distance: 1.0
      path_alignment: 0.8
      goal_distance: 0.6
      velocity_alignment: 0.5
      acceleration: 0.3

# 窄道通行参数
narrow_passage:
  ros__parameters:
    # 窄道检测
    detection:
      # 最小通道宽度
      min_passage_width: 0.6
      
      # 机器人宽度 (用于判断是否能通过)
      robot_width: 0.4
      
      # 安全余量
      safety_margin: 0.1
      
      # 检测范围
      detection_range: 3.0
    
    # 通行策略
    strategy:
      # 通行速度 (通常降低速度)
      passage_velocity: 0.15
      
      # 最大通行速度
      max_passage_velocity: 0.2
      
      # 角度修正增益
      angle_correction_gain: 2.0
      
      # 横向修正增益
      lateral_correction_gain: 1.5
      
      # 是否启用精确模式
      precision_mode: true
      
      # 精确模式下的额外安全距离
      precision_safety_distance: 0.05
    
    # 通行检查
    validation:
      # 最小通行时间 (s)
      min_passage_time: 3.0
      
      # 是否检查通过后空间
      check_exit_space: true
      
      # 窄道入口容差
      entry_tolerance: 0.05