# ============================================================
# rosiwit_app - GitLab CI/CD Pipeline (ROS2 Humble)
# ============================================================
# Pipeline stages:
#   1. lint    - Code quality and style checks
#   2. build   - ROS2 colcon build + Docker image build
#   3. test    - Automated testing
#   4. deploy  - Image push and deployment
# ============================================================

# Global variables
variables:
  DOCKER_IMAGE: "rosiwit-app"
  DOCKER_TAG: "1.0.0"
  DOCKER_REGISTRY: "${CI_REGISTRY}"
  ROS_DISTRO: "humble"
  ROS_VERSION: "2"
  DOCKER_BUILDKIT: "1"
  DOCKER_DRIVER: overlay2
  GIT_DEPTH: "1"

# Stages
stages:
  - lint
  - build
  - test
  - deploy

# Default settings
default:
  image: ros:humble-ros-base-jammy
  before_script:
    - source /opt/ros/humble/setup.bash
  timeout: 30 minutes
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ============================================================
# Stage 1: Lint
# ============================================================
xmllint:
  stage: lint
  image: alpine:3.18
  before_script:
    - apk add --no-cache libxml2-utils
  script:
    - echo "Checking XML files..."
    - find . -name "*.xml" -not -path "./docker/*" -exec xmllint --noout {} \;
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: true

flake8:
  stage: lint
  before_script:
    - pip3 install flake8
  script:
    - echo "Running flake8..."
    - flake8 rosiwit_app/ --max-line-length=120 --count --statistics
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: true

pydocstyle:
  stage: lint
  before_script:
    - pip3 install pydocstyle
  script:
    - echo "Running pydocstyle..."
    - pydocstyle rosiwit_app/ --count || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: true

shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  before_script: []
  script:
    - echo "Checking shell scripts..."
    - find docker/ -name "*.sh" -exec shellcheck {} \;
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: true

# ============================================================
# Stage 2: Build
# ============================================================
colcon-build:
  stage: build
  script:
    - echo "Installing dependencies..."
    - apt-get update -qq && apt-get install -y -qq python3-colcon-common-extensions python3-rosdep > /dev/null
    - rosdep init || true && rosdep update || true
    - echo "Building rosiwit_app..."
    - mkdir -p ../rosiwit_simulator ../rosiwit_slam ../rosiwit_navigation
    - colcon build --packages-select rosiwit_app --symlink-install
      --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo
  artifacts:
    paths:
      - install/
      - build/
      - log/
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

docker-build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script: []
  script:
    - echo "Building Docker image..."
    - docker build
      -f docker/Dockerfile
      --target runtime
      -t ${DOCKER_IMAGE}:${DOCKER_TAG}
      -t ${DOCKER_IMAGE}:latest
      --build-arg BUILDKIT_INLINE_CACHE=1
      ..
    - echo "Image built successfully"
    - docker images ${DOCKER_IMAGE}
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  variables:
    DOCKER_TLS_CERTDIR: "/certs"

# ============================================================
# Stage 3: Test
# ============================================================
pytest:
  stage: test
  dependencies:
    - colcon-build
  before_script:
    - source /opt/ros/humble/setup.bash
    - source install/setup.bash || true
    - pip3 install pytest pytest-cov pytest-asyncio
  script:
    - echo "Running Python tests..."
    - cd rosiwit_app/tests || true
    - python3 -m pytest tests/ -v
      --tb=short
      --junitxml=../test_results/rosiwit_app_pytest.xml
      --cov=rosiwit_app
      --cov-report=term-missing
      --cov-report=xml:../test_results/coverage.xml
      || true
  artifacts:
    when: always
    paths:
      - test_results/
    reports:
      junit: test_results/rosiwit_app_pytest.xml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

ament-test:
  stage: test
  dependencies:
    - colcon-build
  script:
    - echo "Running ament tests..."
    - colcon test --packages-select rosiwit_app --event-handlers console_direct+
    - colcon test-result --all --verbose
  artifacts:
    when: always
    paths:
      - test_results/
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ============================================================
# Stage 4: Deploy
# ============================================================
docker-push:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - echo "${CI_REGISTRY_PASSWORD}" | docker login -u "${CI_REGISTRY_USER}" --password-stdin "${CI_REGISTRY}"
  script:
    - echo "Pushing Docker image..."
    - docker build
      -f docker/Dockerfile
      --target runtime
      -t ${CI_REGISTRY_IMAGE}/${DOCKER_IMAGE}:${DOCKER_TAG}
      -t ${CI_REGISTRY_IMAGE}/${DOCKER_IMAGE}:latest
      ..
    - docker push ${CI_REGISTRY_IMAGE}/${DOCKER_IMAGE}:${DOCKER_TAG}
    - docker push ${CI_REGISTRY_IMAGE}/${DOCKER_IMAGE}:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
