# FAST-LIO2 SLAM - Ouster OS1-16 Configuration
# 适用于 NTU-VIRAL 数据集 (Ouster OS1-16 Gen1)
# 数据集来源: https://ntu-aris.github.io/ntu_viral_dataset/

## ==================== IMU 参数 ====================
imu:
  acc_noise: 0.1        # 加速度计噪声 (m/s^2)
  gyro_noise: 0.01      # 陀螺仪噪声 (rad/s)
  acc_bias_noise: 0.0001
  gyro_bias_noise: 0.00001
  gravity: 9.81         # 重力加速度

## ==================== LiDAR 参数 ====================
lidar:
  scan_line: 16         # Ouster OS1-16 线数 (与OS1-64区别)
  scan_period: 0.1      # 扫描周期 (10Hz)
  max_range: 120.0      # Ouster OS1 最大测量距离
  min_range: 0.5        # 最小测量距离
  max_angle: 45.0       # Ouster 扫描角度范围 (垂直±45度)
  voxel_size: 0.2       # 体素滤波大小

## ==================== 外参 (LiDAR -> IMU) ====================
# Ouster传感器通常内置IMU，外参较小
# NTU-VIRAL数据集的外参可能需要微调
extrinsic:
  translation: [0.0, 0.0, 0.0]    # 平移 (米)
  rotation: [0.0, 0.0, 0.0]       # 旋转 (欧拉角, 弧度)

## ==================== IEKF 参数 ====================
iekf:
  max_iterations: 5         # 最大迭代次数
  converge_threshold: 0.001 # 收敛阈值
  position_noise: 0.01      # 位置噪声
  rotation_noise: 0.01      # 旋转噪声

## ==================== 闭环检测参数 ====================
loop_closure:
  enable: true              # 启用闭环检测
  detection_rate: 0.5       # 检测频率 (Hz)
  min_interval: 50          # 最小闭环间隔 (帧)
  threshold: 0.3            # 闭环阈值

## ==================== ROS2 参数 ====================
ros:
  # 输入话题 - 需要通过 --remap 映射
  # NTU-VIRAL 原始 topic: /os1_cloud_node/points, /os1_cloud_node/imu
  # 播放时使用: --remap /os1_cloud_node/points:=/ouster/points
  lidar_topic: "/ouster/points"      # 重映射后的LiDAR话题
  imu_topic: "/ouster/imu"           # 重映射后的IMU话题
  odom_topic: "/odom"

  # 输出话题
  odom_output_topic: "/odom_estimated"
  path_topic: "/path_estimated"
  map_topic: "/cloud_map"
  keyframe_topic: "/keyframe_cloud"

  # 坐标系
  world_frame: "world"
  map_frame: "map"
  odom_frame: "odom"
  base_frame: "base_link"
  lidar_frame: "os_sensor"        # Ouster 默认坐标系
  imu_frame: "os_imu"             # Ouster IMU坐标系

  # 服务
  save_map_service: "/save_map"
  load_map_service: "/load_map"
  save_pcd_service: "/save_pcd"

  # 发布参数
  map_publish_rate: 2.0     # 地图发布频率 (Hz)
  path_publish_rate: 20.0   # 路径发布频率 (Hz)
  map_max_points: 1000000   # 地图最大点数

  # TF
  publish_tf: true
  tf_publish_rate: 50.0     # TF发布频率 (Hz)

## ==================== GTSAM 后端优化参数 ====================
gtsam:
  enable: true                    # 启用GTSAM后端优化
  optimization_interval: 100      # 优化间隔 (帧)
  isam_relinearize_threshold: 0.1 # ISAM重线性化阈值
  isam_relinearize_skip: 1        # ISAM重线性化跳过帧数

## ==================== 闭环优化参数 ====================
loop_optimization:
  enable: true              # 启用闭环优化
  min_loop_candidates: 5    # 最小闭环候选数
  loop_search_radius: 30.0   # 闭环搜索半径 (米)
  icp_score_threshold: 0.3   # ICP评分阈值

## ==================== 多线程参数 ====================
threading:
  num_threads: 4            # 线程数 (建议与CPU核心数匹配)
  enable_parallel_processing: true

## ==================== 性能监控参数 ====================
profiler:
  enable: true              # 启用性能监控
  log_interval: 100         # 日志间隔 (帧)
  output_dir: "./profiler_stats"

## ==================== 地图输出参数 ====================
map_output:
  default_format: "pcd"     # 默认地图格式: pcd/ply
  compression: true         # 启用压缩
  output_dir: "./maps"      # 地图输出目录

## ==================== NTU-VIRAL 数据集特定配置 ====================
dataset:
  name: "NTU-VIRAL"
  sensor: "Ouster OS1-16 Gen1"
  # Topic 重映射配置
  topic_remapping:
    source_lidar: "/os1_cloud_node/points"
    target_lidar: "/ouster/points"
    source_imu: "/os1_cloud_node/imu"
    target_imu: "/ouster/imu"
  # 建议的播放速率
  recommended_play_rate: 1.0