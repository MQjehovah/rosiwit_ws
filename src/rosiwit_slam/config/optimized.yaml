# FAST-LIO2 SLAM - Optimized Configuration
# 使用优化后的性能配置，适合高性能建图场景

## ==================== IMU 参数 ====================
imu:
  acc_noise: 0.1        # 加速度计噪声 (m/s^2)
  gyro_noise: 0.01      # 陀螺仪噪声 (rad/s)
  acc_bias_noise: 0.0001
  gyro_bias_noise: 0.00001
  gravity: 9.81         # 重力加速度

## ==================== LiDAR 参数 ====================
lidar:
  scan_line: 16         # 激光线数 (16线/32线/64线)
  scan_period: 0.1      # 扫描周期 (秒)
  max_range: 100.0      # 最大测量距离 (米)
  min_range: 0.5        # 最小测量距离 (米)
  max_angle: 30.0       # 最大扫描角度 (度)
  voxel_size: 0.2       # 体素滤波大小

## ==================== 外参 (LiDAR -> IMU) ====================
extrinsic:
  translation: [0.0, 0.0, 0.0]    # 平移 (米)
  rotation: [0.0, 0.0, 0.0]       # 旋转 (欧拉角, 弧度)

## ==================== IEKF 参数 (优化版) ====================
iekf:
  max_iterations: 5         # 最大迭代次数
  converge_threshold: 0.001 # 收敛阈值
  position_noise: 0.01      # 位置噪声
  rotation_noise: 0.01      # 旋转噪声
  
  # ✨ 并行处理参数 (新增)
  enable_parallel: true     # 启用并行处理
  thread_pool_size: 4       # 线程池大小 (建议: CPU核心数)

## ==================== 闭环检测参数 (优化版) ====================
loop_closure:
  enable: true              # 启用闭环检测
  detection_rate: 0.5       # 检测频率 (Hz)
  min_interval: 50          # 最小闭环间隔 (帧)
  threshold: 0.3            # 闭环阈值
  
  # ✨ GTSAM后端优化参数 (新增)
  backend_optimization: true  # 启用GTSAM后端优化
  optimization_interval: 10   # 每10个闭环执行一次优化
  isam2_relinearize_threshold: 0.1  # ISAM2重线性化阈值
  isam2_relinearize_skip: 1        # ISAM2重线性化跳过次数

## ==================== 里程计融合参数 ====================
odom_fusion:
  enable: false             # 启用里程计融合
  fusion_mode: "loose"      # 融合模式: loose/tight
  lidar_weight: 0.7
  odom_weight: 0.3

## ==================== ROS2 参数 ====================
ros:
  # 输入话题
  lidar_topic: "/ouster/points"      # 匹配rosbag2数据包: Ouster LiDAR点云
  imu_topic: "/ouster/imu"           # 匹配rosbag2数据包: Ouster IMU数据
  odom_topic: "/odom"

  # 输出话题
  odom_output_topic: "/odom_estimated"
  path_topic: "/path_estimated"
  map_topic: "/cloud_map"
  keyframe_topic: "/keyframe_cloud"

  # 坐标系
  world_frame: "world"
  map_frame: "map"
  odom_frame: "odom"
  base_frame: "base_link"
  lidar_frame: "lidar"
  imu_frame: "imu"

  # 服务
  save_map_service: "/save_map"
  load_map_service: "/load_map"
  save_pcd_service: "/save_pcd"

  # 发布参数
  map_publish_rate: 2.0     # 地图发布频率 (Hz)
  path_publish_rate: 20.0   # 路径发布频率 (Hz)
  map_max_points: 1000000   # 地图最大点数

## ==================== 地图管理参数 (优化版) ====================
map:
  # ✨ 地图压缩参数 (新增)
  compression:
    enable: true             # 启用地图压缩
    voxel_size: 0.1          # 体素滤波大小 (压缩后)
    feature_ratio: 0.3       # 特征点保留比例
    compression_level: 5     # PCD压缩级别 (0-9)
  
  # ✨ 子地图管理参数 (新增)
  submap:
    enable: true             # 启用子地图
    size: 50.0               # 子地图大小 (米)
    max_points: 50000        # 子地图最大点数
    overlap_ratio: 0.2       # 子地图重叠率
    compress_old_submaps: true # 压缩旧子地图
    keep_recent_submaps: 5   # 保留最近子地图数量
  
  storage:
    map_path: "./map"        # 地图存储路径
    auto_save: true          # 自动保存
    auto_save_interval: 60.0 # 保存间隔 (秒)
    
  # ✨ 地图质量评估参数 (新增)
  quality:
    enable_evaluation: true  # 启用质量评估
    density_threshold: 100   # 密度阈值 (点/平方米)
    hole_detection: true     # 空洞检测
    report_interval: 30.0    # 报告间隔 (秒)

## ==================== 性能监控参数 (新增) ====================
performance:
  # ✨ 性能分析器配置
  enable_profiler: true      # 启用性能分析
  profile_interval: 5.0      # 性能报告间隔 (秒)
  log_slow_operations: true  # 记录慢操作 (>100ms)
  
  # ✨ 内存监控
  enable_memory_monitor: true # 启用内存监控
  memory_warning_threshold: 80 # 内存警告阈值 (%)
  memory_check_interval: 10.0 # 内存检查间隔 (秒)
  
  # ✨ 可视化调试
  enable_visualization: false # 启用调试可视化 (影响性能)
  covariance_visualization: false # 位姿不确定性可视化
  
  # ✨ 性能阈值
  frame_time_warning: 30.0  # 帧处理时间警告阈值 (ms)
  frame_time_critical: 50.0 # 帧处理时间严重阈值 (ms)

## ==================== 日志参数 ====================
logging:
  level: "info"              # 日志级别: debug/info/warn/error
  console_output: true       # 控制台输出
  file_output: false         # 文件输出
  log_file: "./fast_lio2.log"
  max_log_size: 10           # 最大日志文件大小 (MB)

## ==================== 测试/调试参数 ====================
debug:
  enable_test_mode: false    # 测试模式 (用于单元测试)
  use_sim_time: true         # 使用仿真时间
  publish_debug_topics: false # 发布调试话题
  save_intermediate_results: false # 保存中间结果