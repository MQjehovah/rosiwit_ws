## ==================== rosiwit_slam 仿真建图配置 ====================
## 用于 rosiwit_simulator Gazebo 仿真环境

## ==================== IMU 参数 ====================
imu:
  acc_noise: 0.01
  gyro_noise: 0.001
  acc_bias_noise: 0.0001
  gyro_bias_noise: 0.00001
  gravity: 9.81
  acc_scale: 1.0

## ==================== LiDAR 参数 ====================
lidar:
  scan_line: 16
  scan_period: 0.1
  max_range: 20.0
  min_range: 0.1
  max_angle: 30.0
  voxel_size: 0.2

## ==================== 外参 (LiDAR relative to IMU) ====================
extrinsic:
  translation: [0.0, 0.0, 0.090]
  rotation: [0.0, 0.0, 0.0]

## ==================== IEKF 参数 ====================
iekf:
  max_iterations: 5
  converge_threshold: 0.001
  position_noise: 0.01
  rotation_noise: 0.01
  max_correspondence_distance: 2.0
  use_acc_integration: false   # 仿真平面: 关闭加速度积分, 改为激光主导, 防止速度偏置积分导致位置漂移

## ==================== ROS2 参数 ====================
ros:
  lidar_topic: "/velodyne_points"
  imu_topic: "/imu"
  odom_topic: "/odom"

  odom_output_topic: "/odom_estimated"
  path_topic: "/path_estimated"
  map_topic: "/cloud_map"
  keyframe_topic: "/keyframe_cloud"

  world_frame: "odom"
  map_frame: "map"
  odom_frame: "odom"
  base_frame: "base_footprint"
  lidar_frame: "velodyne_link"
  imu_frame: "imu_link"

  map_publish_rate: 2.0
  path_publish_rate: 20.0
  map_max_points: 1000000
  publish_tf: true
  tf_publish_rate: 50.0

  save_map_service: "/save_map"
  load_map_service: "/load_map"
  save_pcd_service: "/save_pcd"

## ==================== 地图参数 ====================
map:
  resolution: 0.2
  submap_size: 50.0
  max_submap_points: 50000
  map_path: "/tmp/rosiwit_sim_map"
  enable_pcd_save: true
  enable_submap: true

## ==================== 系统参数 ====================
system:
  debug_mode: false
  thread_num: 4
  process_timeout: 0.1
  log_level: "info"
