# ============================================================
# rosiwit_slam + rosiwit_simulator - Docker Compose
# Full SLAM stack: Simulator + SLAM + Visualization
# Security-hardened per security_report.md findings
# ============================================================
# Fixes: SEC-002 (no privileged), SEC-004 (ROS_DOMAIN_ID=42),
#        SEC-007 (scoped network where possible), SEC-006 (package names)
# ============================================================

version: "3.8"

# Shared environment defaults
x-common-env: &common-env
  ROS_DOMAIN_ID: "42"                    # SEC-004: Non-default domain
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  ROS_LOG_LEVEL: INFO

# Shared security options
x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

# Shared logging
x-logging: &logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ==================== Gazebo Simulator ====================
  simulator:
    build:
      context: ../rosiwit_simulator
      dockerfile: docker/Dockerfile
    image: rosiwit-simulator:humble-2.0
    container_name: rosiwit-simulator
    hostname: simulator

    # Security (SEC-002 fix: NO privileged mode)
    user: "1000:1000"
    <<: [*security]
    cap_add:
      - NET_RAW

    environment:
      <<: *common-env
      GAZEBO_HEADLESS: "1"
      DISPLAY: ""

    # SEC-007: Use host networking for DDS discovery (required by ROS2 DDS)
    network_mode: host

    volumes:
      - ../rosiwit_simulator/world:/ros2_ws/src/rosiwit_simulator/world:ro
      - ../rosiwit_simulator/models:/ros2_ws/src/rosiwit_simulator/models:ro
      - /dev/shm:/dev/shm

    working_dir: /ros2_ws

    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

    healthcheck:
      test: ["CMD", "ros2", "topic", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    restart: unless-stopped

    logging: *logging

    command: >
      /bin/bash -c "
        source /opt/ros/humble/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        ros2 launch rosiwit_simulator simulator_gazebo_3d.launch.py
          gui:=false
          use_sim_time:=true
      "

  # ==================== SLAM Node (FAST-LIO2) ====================
  slam:
    build:
      context: ../rosiwit_slam
      dockerfile: docker/Dockerfile
    image: rosiwit-slam:humble-2.0
    container_name: rosiwit-slam
    hostname: slam

    # Security (SEC-001+SEC-002 fix)
    user: "1000:1000"
    <<: [*security]
    cap_add:
      - NET_RAW

    environment:
      <<: *common-env
      ROS_LOG_LEVEL: DEBUG

    # SEC-007: Host networking required for DDS discovery with simulator
    network_mode: host

    volumes:
      - ../rosiwit_slam/config:/config:ro
      - slam-maps:/data/maps
      - slam-bags:/data/bags:ro
      - /dev/shm:/dev/shm

    depends_on:
      simulator:
        condition: service_healthy

    working_dir: /ros2_ws

    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

    healthcheck:
      test: ["CMD", "ros2", "node", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    restart: unless-stopped

    logging: *logging

    # Launch FAST-LIO2 with corrected package name (SEC-006 fix)
    command: >
      /bin/bash -c "
        source /opt/ros/humble/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        ros2 launch rosiwit_slam fast_lio2.launch.py
          config_file:=/config/velodyne_vlp16.yaml
          lidar_topic:=/velodyne_points
          imu_topic:=/imu
          use_sim_time:=true
      "

  # ==================== SLAM Visualization (RViz2) ====================
  slam-viz:
    image: ros:humble-ros-base-jammy
    container_name: rosiwit-slam-viz
    hostname: slam-viz

    # Security
    user: "1000:1000"
    <<: [*security]
    cap_add:
      - NET_RAW

    environment:
      <<: *common-env
      DISPLAY: ${DISPLAY:-:0}
      LIBGL_ALWAYS_SOFTWARE: ${LIBGL_ALWAYS_SOFTWARE:-1}

    network_mode: host

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-/dev/null}:/home/rosuser/.Xauthority:ro
      - /dev/shm:/dev/shm

    depends_on:
      - slam

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

    restart: unless-stopped

    logging: *logging

    command: >
      /bin/bash -c "
        apt-get update && apt-get install -y ros-humble-rviz2 && \
        source /opt/ros/humble/setup.bash &&
        rviz2
      "

  # ==================== Integrated Demo (Simulator + SLAM + Auto-motion) ====================
  demo:
    build:
      context: ../rosiwit_slam
      dockerfile: docker/Dockerfile
    image: rosiwit-slam:humble-2.0
    container_name: rosiwit-demo
    hostname: demo

    user: "1000:1000"
    <<: [*security]
    cap_add:
      - NET_RAW

    environment:
      <<: *common-env

    network_mode: host

    volumes:
      - ../rosiwit_slam/config:/config:ro
      - ../rosiwit_simulator/launch:/sim_launch:ro
      - slam-maps:/data/maps
      - /dev/shm:/dev/shm

    working_dir: /ros2_ws

    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 12G
        reservations:
          cpus: '3.0'
          memory: 6G

    healthcheck:
      test: ["CMD", "ros2", "node", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    restart: unless-stopped

    logging: *logging

    # Launch full demo: simulator + SLAM + auto-motion
    command: >
      /bin/bash -c "
        source /opt/ros/humble/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        ros2 launch rosiwit_simulator simulator_slam_demo.launch.py
          gui:=false
          use_sim_time:=true
      "

  # ==================== Development Environment ====================
  slam-devel:
    build:
      context: ../rosiwit_slam
      dockerfile: docker/Dockerfile.devel
    image: rosiwit-slam:devel-2.0
    container_name: rosiwit-slam-devel
    hostname: slam-devel

    user: "1000:1000"
    <<: [*security]
    cap_add:
      - NET_RAW
      - SYS_PTRACE

    environment:
      <<: *common-env
      ROS_LOG_LEVEL: DEBUG

    network_mode: host

    volumes:
      - ..:/ros2_ws/src:rw
      - slam-maps:/data/maps
      - slam-bags:/data/bags
      - /dev/shm:/dev/shm

    working_dir: /ros2_ws

    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 12G
        reservations:
          cpus: '2.0'
          memory: 6G

    stdin_open: true
    tty: true

    restart: unless-stopped

    logging: *logging

    command: /bin/bash

# ==================== Volumes ====================
volumes:
  slam-maps:
    driver: local
  slam-bags:
    driver: local
